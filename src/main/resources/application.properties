spring.application.name=firebase_notify_api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:moni}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:moni_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep the connection alive if idle for a long time (needed in production)
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1

# Show or not log for each sql query
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=validate

# Allows Hibernate to generate SQL optimized for a particular DBMS
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Firebase credentials path
firebase.credentials.path=C:/java-apis/firebase_notify_api/fcm-flood-monitoring-5a45f1d43d7b.json